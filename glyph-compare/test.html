<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Metrics — Dinsy vs DINsical</title>
  <style>
    @font-face {
      font-family: 'Dinsy';
      src: url('/fonts/woff2/Dinsy-Var.woff2') format('woff2');
      font-weight: 300 900;
      font-style: oblique 0deg 12deg;
    }

    @font-face { font-family: 'DINsical'; font-weight: 300; font-style: normal; src: url('/dinsical/otf/DINsical-Light.otf');        }
    @font-face { font-family: 'DINsical'; font-weight: 300; font-style: italic; src: url('/dinsical/otf/DINsical-LightItalic.otf'); }
    @font-face { font-family: 'DINsical'; font-weight: 400; font-style: normal; src: url('/dinsical/otf/DINsical-Regular.otf');      }
    @font-face { font-family: 'DINsical'; font-weight: 400; font-style: italic; src: url('/dinsical/otf/DINsical-Italic.otf');       }
    @font-face { font-family: 'DINsical'; font-weight: 500; font-style: normal; src: url('/dinsical/otf/DINsical-Medium.otf');       }
    @font-face { font-family: 'DINsical'; font-weight: 500; font-style: italic; src: url('/dinsical/otf/DINsical-MediumItalic.otf');}
    @font-face { font-family: 'DINsical'; font-weight: 700; font-style: normal; src: url('/dinsical/otf/DINsical-Bold.otf');         }
    @font-face { font-family: 'DINsical'; font-weight: 700; font-style: italic; src: url('/dinsical/otf/DINsical-BoldItalic.otf');  }
    @font-face { font-family: 'DINsical'; font-weight: 800; font-style: normal; src: url('/dinsical/otf/DINsical-Heavy.otf');        }
    @font-face { font-family: 'DINsical'; font-weight: 800; font-style: italic; src: url('/dinsical/otf/DINsical-HeavyItalic.otf'); }
    @font-face { font-family: 'DINsical'; font-weight: 900; font-style: normal; src: url('/dinsical/otf/DINsical-Black.otf');        }
    @font-face { font-family: 'DINsical'; font-weight: 900; font-style: italic; src: url('/dinsical/otf/DINsical-BlackItalic.otf'); }

    /* ── Reset / base ───────────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    .container {
        display:flex;
        flex-direction: row;
        background-color: #ffeeee;
        gap: 10px;
    }

    .dinsy {
        font-family: Dinsy;
    }

    .dinsical {
        font-family: Dinsical;
    }

    .text {
        font-size: 160px;
        line-height: 200px;
        font-weight: 500;
        background-color : #eeffee;
    }
  </style>
</head>
<body>

    <div class="container">
        <div class="dinsy">
            <span class="text">Xy</span>
        </div>
        <div class="dinsical">
            <span class="text">Xy</span>
        </div>
    </div>
</body>
</html>
