<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dinsical Dev</title>
</head>
<body class="tab-glyphs">

  <!-- ── Toolbar ─────────────────────────────────────────────────────── -->
  <div class="toolbar">
    <span class="toolbar-title">Dinsical</span>

    <!-- Tab switcher -->
    <div class="tabs" id="tabs">
      <button class="tab-btn active" data-tab="glyphs">Glyphs</button>
      <button class="tab-btn" data-tab="kern">Kern</button>
    </div>

    <div class="ctrl-sep"></div>

    <div class="ctrl-row">
      <!-- Shared: Weight + Italic -->
      <div class="ctrl-group">
        <span class="ctrl-lbl">Weight</span>
        <select id="sel-weight">
          <option value="Light">Light</option>
          <option value="Regular" selected>Regular</option>
          <option value="Medium">Medium</option>
          <option value="Bold">Bold</option>
          <option value="Heavy">Heavy</option>
          <option value="Black">Black</option>
        </select>
      </div>
      <label class="ctrl-check">
        <input type="checkbox" id="chk-italic" /> Italic
      </label>

      <div class="ctrl-sep"></div>

      <!-- Shared: Size + Line width -->
      <div class="ctrl-group">
        <span class="ctrl-lbl">Size</span>
        <input type="range" id="rng-size" min="30" max="200" value="100" step="5" />
        <span class="ctrl-val" id="val-size">100px</span>
      </div>
      <div class="ctrl-group">
        <span class="ctrl-lbl">Line</span>
        <input type="range" id="rng-lw" min="3" max="30" value="12" step="1" />
        <span class="ctrl-val" id="val-lw">1.2px</span>
      </div>

      <!-- Glyph-specific controls -->
      <div class="glyph-ctrl">
        <div class="ctrl-sep"></div>
        <label class="legend-item">
          <input type="checkbox" id="chk-din-next" checked />
          <span class="dot blue"></span>DIN Whim
        </label>
        <label class="legend-item">
          <input type="checkbox" id="chk-dinsical" checked />
          <span class="dot red"></span>Dinsical
        </label>
      </div>

      <!-- Kern-specific controls -->
      <div class="kern-ctrl">
        <div class="ctrl-sep"></div>
        <div class="ctrl-group">
          <span class="ctrl-lbl">View</span>
          <div class="toggle-group" id="btn-view-group">
            <button data-value="overlay" class="active">Overlay</button>
            <button data-value="sbs">Side by side</button>
          </div>
        </div>
        <div class="ctrl-sep"></div>
        <div class="ctrl-group">
          <span class="ctrl-lbl">Show</span>
          <div class="toggle-group" id="btn-filter-group">
            <button data-value="all" class="active">All</button>
            <button data-value="din-next">DIN Whim ≠0</button>
            <button data-value="dinsical">Dinsical ≠0</button>
          </div>
        </div>
        <div class="ctrl-sep"></div>
        <div class="ctrl-group">
          <span class="ctrl-lbl">Range</span>
          <div class="toggle-group" id="btn-range-group">
            <button data-value="ascii" class="active">ASCII</button>
            <button data-value="latin">Latin+</button>
            <button data-value="all">All</button>
          </div>
        </div>
      </div>

      <div class="ctrl-sep"></div>
      <label class="ctrl-check">
        <input type="checkbox" id="chk-baseline" /> Baseline
      </label>
    </div>
  </div>

  <!-- Status bar -->
  <div class="status" id="status">Loading…</div>

  <!-- ── Glyph view ──────────────────────────────────────────────────── -->
  <div id="glyph-view" class="view">
    <div id="glyph-grid"></div>
  </div>

  <!-- ── Kern view ───────────────────────────────────────────────────── -->
  <div id="kern-view" class="view">
    <div class="preview-section">
      <div class="preview-controls">
        <div id="preset-btns"></div>
        <input type="text" id="preview-input" class="preview-input" value="WATER" placeholder="type a word…" />
      </div>
      <div class="preview-canvas-wrap" id="preview-wrap"></div>
    </div>
    <div class="kern-grid-wrap">
      <div id="kern-grid"></div>
    </div>
  </div>

  <!-- ── Shared modal ────────────────────────────────────────────────── -->
  <div class="modal-overlay hidden" id="modal-overlay">
    <div class="modal-card" id="modal-card">
      <div class="modal-header">
        <div class="modal-head-left">
          <span class="modal-glyph" id="modal-char"></span>
          <span class="modal-pair" id="modal-pair"></span>
          <span class="modal-meta" id="modal-meta"></span>
        </div>
        <button class="modal-close-btn" id="modal-close">✕</button>
      </div>
      <div class="modal-canvas-wrap" id="modal-canvas-wrap"></div>
      <div id="modal-ctx-section">
        <div class="modal-ctx-label">In context</div>
        <div class="modal-ctx-wrap" id="modal-ctx-wrap"></div>
      </div>
      <div class="modal-metrics" id="modal-metrics"></div>
    </div>
  </div>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
